<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // --- 핵심 상태 관리 (State) ---
    let globalGrmMap = new Map();  // GRM코드 -> 지점코드 Set
    let globalData = [];           // 전체 메모리 데이터
    let filteredData = [];         // 화면에 뿌려줄 필터링된 데이터
    let lastCheckedIndex = -1;     // Shift 클릭 감지용 인덱스

    // --- 1. 초기화 (GRM_Data.xlsx 로드) ---
    window.addEventListener('DOMContentLoaded', async () => {
        const grmSelect = document.getElementById('grmIdSelect');
        const noticeBadge = document.getElementById('initNotice');
        
        try {
            const cacheBuster = `?v=${Date.now()}`;
            // 저장소에 업로드할 GRM_Data.xlsx 파일 로드
            const response = await fetch('./GRM_Data.xlsx' + cacheBuster);
            if(!response.ok) throw new Error("GRM_Data 파일 누락");
            
            const arrayBuffer = await response.arrayBuffer();
            const wb = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
            const grmData = XLSX.utils.sheet_to_json(wb.Sheets["GRM별_지점코드"], {header: 1});
            
            let selectHtml = `<option value="">-- GRM 담당자를 선택하세요 --</option>`;
            
            for(let c = 0; c < grmData[0].length; c++) {
                let code = String(grmData[0][c] || "").trim();
                let name = String(grmData[1][c] || "").trim();
                
                if(code) {
                    let bSet = new Set();
                    for(let r = 2; r < grmData.length; r++) {
                        let bCode = String(grmData[r][c] || "").trim();
                        if(bCode) bSet.add(bCode);
                    }
                    globalGrmMap.set(code, bSet);
                    if(name && code !== name) {
                        selectHtml += `<option value="${code}">${name} (${code})</option>`;
                    }
                }
            }
            grmSelect.innerHTML = selectHtml;
            grmSelect.disabled = false;
            document.getElementById('btnStart').disabled = false;
            
            noticeBadge.innerText = "연동 완료";
            noticeBadge.classList.replace('bg-warning', 'bg-success');
        } catch(error) {
            console.error(error);
            noticeBadge.innerText = "GRM_Data.xlsx 파일 누락 (기능 제한됨)";
            noticeBadge.classList.replace('bg-warning', 'bg-danger');
        }
    });

    // --- 2. Dropzone UI 처리 ---
    const dropZone = document.getElementById('dropZone');
    const targetFileInput = document.getElementById('targetFile');

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            targetFileInput.files = e.dataTransfer.files;
            handleFileSelect({target: targetFileInput}); 
        }
    });

    function handleFileSelect(e) {
        if(e.target.files.length > 0) {
            document.getElementById('dropIcon').innerHTML = '<i class="bi bi-check-circle-fill"></i>';
            document.getElementById('dropIcon').classList.replace('text-primary', 'text-success');
            document.getElementById('dropTitle').innerText = e.target.files[0].name;
            document.getElementById('dropTitle').classList.replace('text-primary', 'text-success');
            dropZone.style.borderColor = '#198754';
            dropZone.style.backgroundColor = '#e8f5e9';
        }
    }

    // --- 3. 데이터 파싱 파이프라인 (Worker 연동) ---
    function startParsingPipeline() {
        const grmId = document.getElementById('grmIdSelect').value.trim();
        const targetFile = targetFileInput.files[0];
        const staffPosition = document.getElementById('staffPositionSelect').value;

        if(!grmId) return alert("GRM 담당자를 선택해주세요.");
        if(!targetFile) return alert("타겟 데이터 엑셀 파일(MG인사관리 등)을 업로드해주세요.");

        const branchSet = globalGrmMap.get(grmId);
        if(!branchSet) return alert("지점코드 매핑 데이터가 없습니다.");

        document.getElementById('loadingSpinner').style.display = 'flex';

        const reader = new FileReader();
        reader.onload = (e) => {
            const fileBuffer = e.target.result;
            const worker = new Worker('worker.js');
            
            worker.onmessage = (msg) => {
                if(msg.data.status === 'success') {
                    globalData = msg.data.data;
                    applyViewFilter(); // 렌더링 호출
                    
                    document.getElementById('setupPanel').classList.remove('show');
                    document.getElementById('workspaceArea').style.display = 'block';
                    document.getElementById('exportBtnGroup').style.display = 'inline-flex';
                } else {
                    alert('파싱 오류: ' + msg.data.message);
                }
                document.getElementById('loadingSpinner').style.display = 'none';
                worker.terminate(); // 메모리 해제
            };
            
            worker.postMessage({ fileBuffer, branchArray: Array.from(branchSet), staffPosition }, [fileBuffer]);
        };
        reader.readAsArrayBuffer(targetFile);
    }

    // --- 4. 렌더링 및 UI 조작부 (Shift 클릭, 필터링) ---
    function applyViewFilter() {
        const isWarningOnly = document.getElementById('viewWarning').checked;
        if(isWarningOnly) {
            filteredData = globalData.filter(d => d.tempName.length > 16);
        } else {
            filteredData = globalData;
        }
        renderTable();
    }

    // 라디오 버튼 이벤트 등록
    document.getElementById('viewAll').addEventListener('change', applyViewFilter);
    document.getElementById('viewWarning').addEventListener('change', applyViewFilter);

    function renderTable() {
        const tbody = document.getElementById('contactTableBody');
        let htmlChunks = [];

        if(filteredData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-muted py-5">표시할 데이터가 없습니다.</td></tr>`;
            document.getElementById('ui_total_count').innerText = "총 0명";
            return;
        }

        // 전체 데이터를 DOM 스트링으로 결합 (브라우저가 감당 가능함)
        for(let i=0; i<filteredData.length; i++) {
            const d = filteredData[i];
            const len = d.tempName.length;
            let trClass = "";
            if(len >= 21) trClass = "name-danger";
            else if(len >= 17) trClass = "name-warning";

            htmlChunks.push(`
                <tr class="${trClass}" onclick="handleRowClick(event, ${i})">
                    <td><input class="form-check-input row-chk" type="checkbox" data-idx="${i}" ${d.selected ? 'checked' : ''} onclick="event.stopPropagation(); toggleSingleCheck(${i}, event)"></td>
                    <td>${i + 1}</td>
                    <td class="text-start fw-bold">${d.tempName} <span class="text-muted ms-1 fs-6">(${len}자)</span></td>
                    <td>${d.phone}</td>
                    <td>${d.id}</td>
                    <td>${d.role}</td>
                </tr>
            `);
        }

        tbody.innerHTML = htmlChunks.join('');
        document.getElementById('ui_total_count').innerText = `총 ${filteredData.length}명`;
        
        // 전체 체크박스 상태 동기화
        const allChecked = filteredData.length > 0 && filteredData.every(d => d.selected);
        document.getElementById('chkAll').checked = allChecked;
    }

    // Shift 클릭 및 개별 클릭 로직
    function toggleSingleCheck(index, event) {
        const currentData = filteredData[index];
        currentData.selected = !currentData.selected;

        if (event.shiftKey && lastCheckedIndex !== -1) {
            const start = Math.min(lastCheckedIndex, index);
            const end = Math.max(lastCheckedIndex, index);
            for (let i = start; i <= end; i++) {
                filteredData[i].selected = currentData.selected;
            }
            renderTable(); // 다시 그리기
        }
        lastCheckedIndex = index;
        
        // 상단 전체선택 체크박스 연동
        document.getElementById('chkAll').checked = filteredData.every(d => d.selected);
    }

    function handleRowClick(event, index) {
        if (event.target.type !== 'checkbox') {
            const chk = document.querySelector(`.row-chk[data-idx="${index}"]`);
            if(chk) {
                chk.click(); // Row 클릭 시 체크박스 트리거
            }
        }
    }

    function toggleAllCheckboxes() {
        const isChecked = document.getElementById('chkAll').checked;
        filteredData.forEach(d => d.selected = isChecked);
        const boxes = document.querySelectorAll('.row-chk');
        boxes.forEach(box => box.checked = isChecked);
    }

    // --- 5. 이름 일괄 치환 로직 ---
    function applyReplaceRule() {
        const findStr = document.getElementById('findText').value;
        const replaceStr = document.getElementById('replaceText').value;
        
        if(!findStr) return alert("기존 텍스트(찾을 단어)를 입력하세요.");
        
        let changedCount = 0;
        const targetList = filteredData.filter(d => d.selected);
        const loopList = targetList.length > 0 ? targetList : filteredData; // 선택된게 없으면 전체 대상

        document.getElementById('loadingSpinner').style.display = 'flex';
        
        // UI 프리징을 막기 위한 setTimeout 매크로 태스크 
        setTimeout(() => {
            loopList.forEach(d => {
                if(d.tempName.includes(findStr)) {
                    // 일괄 치환 (전역 교체)
                    d.tempName = d.tempName.split(findStr).join(replaceStr).replace(/\s+/g, ' ').trim();
                    changedCount++;
                }
            });

            document.getElementById('loadingSpinner').style.display = 'none';
            renderTable(); // 변경점 즉시 화면 반영
            alert(`치환 완료! 총 ${changedCount}건의 이름이 변경되었습니다.\n(체크된 대상 기준. 체크가 없었다면 전체 기준)`);
        }, 100);
    }

    // (Phase 3 예약: Export 기능들은 추후 구현 예정이므로 빈 함수로 선언)
    function exportExcelBackup() { alert('엑셀 백업: 다음 페이즈에 구현됩니다.'); }
    function exportKaTalk() { alert('까톡오토 양식: 다음 페이즈에 구현됩니다.'); }
    function exportVCard() { alert('vCard 생성: 다음 페이즈에 구현됩니다.'); }
    function downloadRuleSet() { alert('패턴 다운로드: 다음 페이즈에 구현됩니다.'); }
</script>
